<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1E2A4A" />
    <title>DEVCON+ — Sync. Support. Succeed.</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1E2A4A;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: #ffffff;
        border-radius: 24px;
        padding: 40px 32px;
        width: 100%;
        max-width: 360px;
        text-align: center;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.25);
      }

      .logo {
        width: 64px;
        height: 64px;
        background: #3B82F6;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 900;
        color: white;
        margin: 0 auto 20px;
      }

      h1 {
        font-size: 28px;
        font-weight: 900;
        color: #0F172A;
        letter-spacing: -0.5px;
        line-height: 1.2;
      }

      .tagline {
        font-size: 14px;
        color: #64748B;
        margin-top: 8px;
        margin-bottom: 36px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 14px 20px;
        border-radius: 16px;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        transition: opacity 0.15s, transform 0.1s;
        cursor: pointer;
        border: none;
      }
      .btn:active { transform: scale(0.98); opacity: 0.9; }

      .btn-primary {
        background: #3B82F6;
        color: #ffffff;
        margin-bottom: 12px;
      }

      .btn-secondary {
        background: #F1F5F9;
        color: #1E2A4A;
      }

      .btn-label {
        display: block;
        font-size: 11px;
        font-weight: 500;
        opacity: 0.7;
        margin-top: 3px;
        letter-spacing: 0.3px;
      }

      .footer {
        margin-top: 28px;
        font-size: 12px;
        color: #94A3B8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">D+</div>
      <h1>DEVCON+</h1>
      <p class="tagline">Sync. Support. Succeed.</p>

      <a href="https://devcon-plus-member.vercel.app" class="btn btn-primary">
        I'm a Member
        <span class="btn-label">Register for events · Earn points · Browse jobs</span>
      </a>

      <a href="https://devcon-plus-org.vercel.app" class="btn btn-secondary">
        I'm an Officer
        <span class="btn-label">Manage events · Scan QR · Approve registrations</span>
      </a>

      <p class="footer">DEVCON Philippines · 11 Chapters · 60,000+ Members</p>
    </div>
  </body>
</html>
